<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Easy Facture</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Easy Facture"/>
  <meta name="theme-color" content="#6C47FF"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #6C47FF;
      --primary2: #8B6FFF;
      --orange: #FF6B35;
      --green: #00C48C;
      --red: #FF4757;
      --gold: #FFD700;
      --bg: #F5F4FF;
      --white: #ffffff;
      --card: #ffffff;
      --text: #1a1a2e;
      --muted: #8888aa;
      --border: #E8E6FF;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(108,71,255,0.1);
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Sora',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
    button { font-family:'Sora',inherit; cursor:pointer; border:none; }
    input, textarea, select { font-family:'Sora',inherit; }

    /* ── SCREENS ── */
    .screen { display:none; min-height:100vh; }
    .screen.active { display:flex; flex-direction:column; }

    /* ── AUTH SCREEN ── */
    #authScreen {
      background: linear-gradient(160deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      align-items:center; justify-content:center; padding:30px 24px;
      position:relative; overflow:hidden;
    }
    #authScreen::before {
      content:''; position:absolute; width:400px; height:400px;
      background:radial-gradient(circle, rgba(108,71,255,0.4) 0%, transparent 70%);
      top:-100px; right:-100px; pointer-events:none;
    }
    #authScreen::after {
      content:''; position:absolute; width:300px; height:300px;
      background:radial-gradient(circle, rgba(255,107,53,0.25) 0%, transparent 70%);
      bottom:-50px; left:-50px; pointer-events:none;
    }
    .auth-box { width:100%; max-width:400px; z-index:1; }
    .auth-logo { text-align:center; margin-bottom:36px; }
    .auth-logo-icon { width:72px; height:72px; background:linear-gradient(135deg,var(--primary),var(--orange)); border-radius:20px; display:inline-flex; align-items:center; justify-content:center; margin-bottom:14px; box-shadow:0 8px 30px rgba(108,71,255,0.5); }
    .auth-logo h1 { color:white; font-size:28px; font-weight:900; letter-spacing:-0.5px; }
    .auth-logo p { color:rgba(255,255,255,0.5); font-size:13px; margin-top:4px; }
    .auth-card { background:rgba(255,255,255,0.06); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.12); border-radius:24px; padding:28px 24px; }
    .auth-tabs { display:flex; background:rgba(255,255,255,0.08); border-radius:12px; padding:4px; margin-bottom:24px; }
    .auth-tab { flex:1; padding:10px; text-align:center; border-radius:9px; font-size:14px; font-weight:700; color:rgba(255,255,255,0.5); transition:all .2s; }
    .auth-tab.active { background:var(--primary); color:white; box-shadow:0 4px 12px rgba(108,71,255,0.4); }
    .auth-input { width:100%; background:rgba(255,255,255,0.1); border:1.5px solid rgba(255,255,255,0.15); border-radius:12px; padding:13px 16px; font-size:14px; color:white; outline:none; margin-bottom:12px; transition:border-color .2s; }
    .auth-input::placeholder { color:rgba(255,255,255,0.35); }
    .auth-input:focus { border-color:var(--primary); }
    .auth-btn-main { width:100%; background:linear-gradient(135deg,var(--primary),var(--primary2)); color:white; border-radius:12px; padding:14px; font-size:15px; font-weight:800; margin-top:4px; box-shadow:0 6px 20px rgba(108,71,255,0.4); transition:transform .15s; }
    .auth-btn-main:active { transform:scale(0.97); }
    .auth-divider { display:flex; align-items:center; gap:12px; margin:16px 0; }
    .auth-divider span { color:rgba(255,255,255,0.3); font-size:12px; white-space:nowrap; }
    .auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.12); }
    .auth-google { width:100%; background:white; color:#333; border-radius:12px; padding:13px; font-size:14px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:10px; }
    .auth-error { color:#FF6B6B; font-size:12px; text-align:center; margin-top:8px; min-height:20px; }

    /* ── ONBOARDING ── */
    #onboardScreen {
      background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);
      padding:24px; align-items:center; justify-content:center;
    }
    .onboard-box { width:100%; max-width:420px; }
    .onboard-title { color:white; font-size:24px; font-weight:900; margin-bottom:6px; }
    .onboard-sub { color:rgba(255,255,255,0.5); font-size:14px; margin-bottom:28px; }
    .onboard-input { width:100%; background:rgba(255,255,255,0.1); border:1.5px solid rgba(255,255,255,0.15); border-radius:12px; padding:13px 16px; font-size:14px; color:white; outline:none; margin-bottom:12px; }
    .onboard-input::placeholder { color:rgba(255,255,255,0.35); }
    .onboard-row { display:flex; gap:10px; }
    .onboard-row .onboard-input { flex:1; }

    /* ── MAIN APP ── */
    #appScreen { padding-bottom:76px; }

    /* HEADER */
    .app-header {
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      padding:14px 18px 16px;
      position:sticky; top:0; z-index:100;
      box-shadow:0 4px 20px rgba(108,71,255,0.3);
    }
    .header-top { display:flex; align-items:center; gap:12px; }
    .header-logo { font-size:18px; font-weight:900; color:white; letter-spacing:-0.5px; }
    .header-plan { background:rgba(255,255,255,0.2); border-radius:20px; padding:3px 10px; font-size:10px; font-weight:700; color:white; }
    .header-plan.pro { background:var(--gold); color:#333; }
    .header-avatar { width:36px; height:36px; border-radius:18px; background:rgba(255,255,255,0.25); display:flex; align-items:center; justify-content:center; color:white; font-weight:800; font-size:14px; margin-left:auto; cursor:pointer; }

    /* BOTTOM NAV */
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0; z-index:100;
      background:white; border-top:1px solid var(--border);
      display:flex; padding:6px 0 calc(6px + env(safe-area-inset-bottom));
      box-shadow:0 -4px 24px rgba(108,71,255,0.08);
    }
    .nav-btn { flex:1; background:none; border:none; padding:8px 4px 4px; display:flex; flex-direction:column; align-items:center; gap:4px; font-size:10px; font-weight:700; color:#bbb; transition:color .2s; }
    .nav-btn.active { color:var(--primary); }
    .nav-btn svg { transition:transform .2s; }
    .nav-btn.active svg { transform:scale(1.15); }

    /* CONTENT */
    .content { padding:18px 16px 10px; max-width:700px; margin:0 auto; }

    /* CARDS */
    .card { background:var(--card); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); margin-bottom:14px; border:1px solid var(--border); }
    .card-title { font-weight:800; color:var(--primary); font-size:14px; margin-bottom:14px; }

    /* STAT GRID */
    .stat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px; }
    .stat-card { background:var(--card); border-radius:14px; padding:16px; box-shadow:var(--shadow); border:1px solid var(--border); }
    .stat-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
    .stat-value { font-size:26px; font-weight:900; margin-top:4px; }
    .stat-sub { font-size:11px; color:var(--muted); margin-top:2px; }

    /* BUTTONS */
    .btn { border-radius:12px; padding:11px 18px; font-weight:700; font-size:13px; display:inline-flex; align-items:center; gap:7px; transition:all .15s; }
    .btn:active { transform:scale(0.96); }
    .btn-primary { background:var(--primary); color:white; box-shadow:0 4px 14px rgba(108,71,255,0.3); }
    .btn-orange { background:var(--orange); color:white; box-shadow:0 4px 14px rgba(255,107,53,0.3); }
    .btn-green { background:var(--green); color:white; }
    .btn-ghost { background:var(--bg); color:var(--text); border:1.5px solid var(--border); }
    .btn-ai { background:linear-gradient(135deg,var(--primary),#9B59B6); color:white; box-shadow:0 4px 14px rgba(108,71,255,0.35); }
    .btn-sm { padding:7px 13px; font-size:12px; border-radius:10px; }
    .btn-icon { width:36px; height:36px; padding:0; border-radius:10px; justify-content:center; }
    .btn-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }

    /* SECTION */
    .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .section-title { font-weight:800; color:var(--text); font-size:17px; }

    /* LIST ITEMS */
    .list-item { background:var(--card); border-radius:14px; padding:14px 16px; box-shadow:var(--shadow); margin-bottom:10px; border:1px solid var(--border); }
    .list-title { font-weight:700; color:var(--text); font-size:14px; }
    .list-sub { font-size:12px; color:var(--muted); margin-top:2px; }

    /* BADGE */
    .badge { font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; display:inline-block; }
    .badge-green { background:#e8fff7; color:var(--green); }
    .badge-orange { background:#fff4ee; color:var(--orange); }
    .badge-purple { background:#f0eeff; color:var(--primary); }
    .badge-gold { background:#fff8dc; color:#B8860B; }

    /* FORMS */
    .form-group { margin-bottom:14px; }
    .form-row { display:flex; gap:10px; }
    .form-row .form-group { flex:1; min-width:0; }
    label { display:block; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; }
    input, textarea, select { width:100%; border-radius:10px; border:1.5px solid var(--border); padding:11px 13px; font-size:14px; outline:none; background:white; transition:border-color .2s; color:var(--text); }
    input:focus, textarea:focus, select:focus { border-color:var(--primary); }
    textarea { resize:vertical; min-height:80px; }

    /* MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:500; display:none; align-items:flex-end; backdrop-filter:blur(4px); }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--bg); border-radius:24px 24px 0 0; width:100%; max-height:92vh; overflow-y:auto; padding-bottom:env(safe-area-inset-bottom); }
    .modal-header { background:linear-gradient(135deg,var(--primary),var(--primary2)); padding:18px 20px; border-radius:24px 24px 0 0; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:10; }
    .modal-title { color:white; font-weight:800; font-size:16px; }
    .modal-close { margin-left:auto; background:rgba(255,255,255,0.2); border:none; color:white; border-radius:10px; width:34px; height:34px; font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .modal-body { padding:20px; }

    /* PREVIEW */
    .preview-overlay { position:fixed; inset:0; background:#111; z-index:600; display:none; flex-direction:column; }
    .preview-overlay.open { display:flex; }
    .preview-bar { background:var(--primary); padding:12px 16px; display:flex; align-items:center; gap:10px; flex-shrink:0; padding-top:calc(12px + env(safe-area-inset-top)); }
    .preview-frame { flex:1; border:none; }

    /* LIGNE */
    .ligne-item { background:var(--bg); border-radius:12px; padding:12px; margin-bottom:8px; border:1px solid var(--border); }

    /* TOTAUX */
    .totaux { border-top:1.5px solid var(--border); padding-top:12px; margin-top:10px; }
    .total-row { display:flex; justify-content:space-between; font-size:13px; color:var(--muted); margin-bottom:6px; }
    .total-ttc { background:var(--primary); color:white; border-radius:10px; padding:11px 14px; display:flex; justify-content:space-between; font-weight:800; font-size:15px; margin-top:6px; }

    /* PLAN CARDS */
    .plan-card { border-radius:16px; padding:20px; margin-bottom:12px; border:2px solid var(--border); position:relative; overflow:hidden; }
    .plan-card.pro { border-color:var(--primary); background:linear-gradient(135deg,#f0eeff,#fff); }
    .plan-card.team { border-color:var(--orange); background:linear-gradient(135deg,#fff4ee,#fff); }
    .plan-badge { position:absolute; top:12px; right:12px; }

    /* LOADING */
    .loading { display:flex; align-items:center; justify-content:center; height:200px; flex-direction:column; gap:12px; color:var(--muted); }
    .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* EMPTY */
    .empty { text-align:center; padding:50px 20px; color:var(--muted); }
    .empty-icon { font-size:48px; margin-bottom:12px; }

    /* AVATAR */
    .avatar { width:42px; height:42px; border-radius:21px; background:linear-gradient(135deg,var(--primary),var(--primary2)); display:flex; align-items:center; justify-content:center; color:white; font-weight:800; font-size:16px; flex-shrink:0; }

    /* LIMIT BANNER */
    .limit-banner { background:linear-gradient(135deg,#fff4ee,#fff8dc); border:1.5px solid var(--orange); border-radius:12px; padding:12px 14px; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
    .limit-banner-text { flex:1; font-size:12px; color:#8B4513; font-weight:600; }
    
    /* WATERMARK notice */
    .wm-notice { background:#f0eeff; border-radius:10px; padding:10px 13px; font-size:11px; color:var(--primary); margin-top:8px; font-weight:600; }

    /* PROFILE MENU */
    .profile-menu { position:fixed; top:0; right:0; bottom:0; left:0; z-index:400; display:none; }
    .profile-menu.open { display:block; }
    .profile-panel { position:absolute; top:70px; right:16px; background:white; border-radius:16px; padding:8px; box-shadow:0 8px 40px rgba(0,0,0,0.15); border:1px solid var(--border); min-width:200px; }
    .profile-item { padding:12px 14px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:10px; }
    .profile-item:hover { background:var(--bg); }

    /* SYNC */
    .sync-dot { width:7px; height:7px; border-radius:50%; background:#00C48C; display:inline-block; margin-right:5px; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

    /* CHECKBOX */
    .check-row { display:flex; align-items:center; gap:10px; cursor:pointer; padding:6px 0; }
    .check-row input[type=checkbox] { width:20px; height:20px; accent-color:var(--green); flex-shrink:0; }
  </style>
</head>
<body>

<!-- ── AUTH SCREEN ─────────────────────────────────────────────── -->
<div id="authScreen" class="screen active">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </div>
      <h1>Easy Facture</h1>
      <p>Devis & Factures pour les pros</p>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">Connexion</div>
        <div class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')">Inscription</div>
      </div>
      <div id="authLoginForm">
        <input class="auth-input" id="loginEmail" type="email" placeholder="Email"/>
        <input class="auth-input" id="loginPassword" type="password" placeholder="Mot de passe"/>
        <button class="auth-btn-main" onclick="loginEmail()">Se connecter</button>
      </div>
      <div id="authRegisterForm" style="display:none">
        <input class="auth-input" id="regEmail" type="email" placeholder="Email"/>
        <input class="auth-input" id="regPassword" type="password" placeholder="Mot de passe (min 6 car.)"/>
        <button class="auth-btn-main" onclick="registerEmail()">Créer mon compte</button>
      </div>
      <div class="auth-divider"><span>ou</span></div>
      <button class="auth-google" onclick="loginGoogle()">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continuer avec Google
      </button>
      <div class="auth-error" id="authError"></div>
    </div>
  </div>
</div>

<!-- ── ONBOARDING SCREEN ───────────────────────────────────────── -->
<div id="onboardScreen" class="screen">
  <div style="background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="onboard-box">
      <div style="font-size:40px;margin-bottom:16px">🏢</div>
      <div class="onboard-title">Configurons votre entreprise</div>
      <div class="onboard-sub">Ces informations apparaîtront sur vos factures et devis.</div>
      <input class="onboard-input" id="ob_company" placeholder="Nom de votre entreprise *"/>
      <div class="onboard-row">
        <input class="onboard-input" id="ob_prenom" placeholder="Votre prénom"/>
        <input class="onboard-input" id="ob_nom" placeholder="Votre nom"/>
      </div>
      <input class="onboard-input" id="ob_adresse" placeholder="Adresse"/>
      <div class="onboard-row">
        <input class="onboard-input" id="ob_cp" placeholder="Code postal"/>
        <input class="onboard-input" id="ob_ville" placeholder="Ville"/>
      </div>
      <input class="onboard-input" id="ob_siret" placeholder="SIRET / RCS (optionnel)"/>
      <input class="onboard-input" id="ob_tel" placeholder="Téléphone"/>
      <input class="onboard-input" id="ob_email2" placeholder="Email pro"/>
      <button class="auth-btn-main" style="margin-top:8px" onclick="saveOnboarding()">Démarrer →</button>
      <div class="auth-error" id="obError"></div>
    </div>
  </div>
</div>

<!-- ── APP SCREEN ─────────────────────────────────────────────── -->
<div id="appScreen" class="screen">

  <div class="app-header">
    <div class="header-top">
      <div>
        <div class="header-logo">Easy Facture</div>
      </div>
      <span class="sync-dot" id="syncDot"></span>
      <span id="planBadge" class="header-plan">GRATUIT</span>
      <div class="header-avatar" id="headerAvatar" onclick="toggleProfile()">?</div>
    </div>
    <div id="companyBar" style="color:rgba(255,255,255,0.65);font-size:11px;margin-top:4px;font-weight:600;"></div>
  </div>

  <div class="content" id="mainContent">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="navigate('dashboard')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      Accueil
    </button>
    <button class="nav-btn" id="nav-clients" onclick="navigate('clients')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Clients
    </button>
    <button class="nav-btn" id="nav-factures" onclick="navigate('factures')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      Factures
    </button>
    <button class="nav-btn" id="nav-devis" onclick="navigate('devis')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Devis
    </button>
    <button class="nav-btn" id="nav-compte" onclick="navigate('compte')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Compte
    </button>
  </div>

<!-- ── FIREBASE + APP ─────────────────────────────────────────── -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, getDoc, setDoc, onSnapshot, query, orderBy, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCAp2wPf9G0IDFDmw6Fpg2FDI0oepF6kyU",
  authDomain: "esay-facture.firebaseapp.com",
  projectId: "esay-facture",
  storageBucket: "esay-facture.firebasestorage.app",
  messagingSenderId: "282351825017",
  appId: "1:282351825017:web:0f0c6fddedc56f81f5a4a8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const googleProvider = new GoogleAuthProvider();

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentUser = null;
let userProfile = null;
let clients = [];
let documents = [];
let currentTab = 'dashboard';
let editingDoc = null;
let editingClient = null;
let unsubClients = null;
let unsubDocs = null;

// FREEMIUM LIMITS
const LIMITS = {
  free: { clients: 3, docsPerMonth: 5 },
  pro:  { clients: Infinity, docsPerMonth: Infinity },
  team: { clients: Infinity, docsPerMonth: Infinity }
};

function isPro() { return userProfile?.plan === 'pro' || userProfile?.plan === 'team'; }
function getLimit(k) { return LIMITS[userProfile?.plan || 'free'][k]; }

function docsThisMonth() {
  const now = new Date();
  return documents.filter(d => {
    const t = d.createdAt?.toDate?.();
    return t && t.getMonth() === now.getMonth() && t.getFullYear() === now.getFullYear();
  }).length;
}

// ─── AUTH STATE ───────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    await loadUserProfile(user);
  } else {
    currentUser = null;
    userProfile = null;
    showScreen('authScreen');
  }
});

async function loadUserProfile(user) {
  const ref = doc(db, 'users', user.uid);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    userProfile = snap.data();
    startListeners(user.uid);
    showScreen('appScreen');
    updateHeaderUI();
    navigate('dashboard');
  } else {
    showScreen('onboardScreen');
  }
}

function startListeners(uid) {
  if (unsubClients) unsubClients();
  if (unsubDocs) unsubDocs();
  unsubClients = onSnapshot(collection(db,'users',uid,'clients'), snap => {
    clients = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    if (currentTab==='clients') renderClients();
    if (currentTab==='dashboard') renderDashboard();
  });
  unsubDocs = onSnapshot(query(collection(db,'users',uid,'documents'), orderBy('createdAt','desc')), snap => {
    documents = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    if (currentTab==='dashboard') renderDashboard();
    if (currentTab==='factures') renderDocs('facture');
    if (currentTab==='devis') renderDocs('devis');
  });
}

function updateHeaderUI() {
  const plan = userProfile?.plan || 'free';
  const badge = document.getElementById('planBadge');
  if (badge) {
    badge.textContent = plan === 'pro' ? 'PRO' : plan === 'team' ? 'ÉQUIPE' : 'GRATUIT';
    badge.className = 'header-plan' + (isPro() ? ' pro' : '');
  }
  const company = userProfile?.company || '';
  const bar = document.getElementById('companyBar');
  if (bar) bar.textContent = company;
  const av = document.getElementById('headerAvatar');
  if (av) av.textContent = (userProfile?.prenom?.[0] || currentUser?.email?.[0] || '?').toUpperCase();
  document.getElementById('profileName').textContent = `${userProfile?.prenom||''} ${userProfile?.nom||''}`.trim() || 'Utilisateur';
  document.getElementById('profileEmail').textContent = currentUser?.email || '';
}

// ─── SCREENS ──────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── AUTH ACTIONS ─────────────────────────────────────────────────────────────
window.switchAuthTab = function(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab==='login');
  document.getElementById('tabRegister').classList.toggle('active', tab==='register');
  document.getElementById('authLoginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('authRegisterForm').style.display = tab==='register'?'block':'none';
  document.getElementById('authError').textContent = '';
}

window.loginEmail = async function() {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPassword').value;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    document.getElementById('authError').textContent = 'Email ou mot de passe incorrect.';
  }
}

window.registerEmail = async function() {
  const email = document.getElementById('regEmail').value;
  const pass = document.getElementById('regPassword').value;
  if (pass.length < 6) { document.getElementById('authError').textContent = 'Mot de passe trop court.'; return; }
  try {
    await createUserWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    document.getElementById('authError').textContent = 'Cet email est déjà utilisé.';
  }
}

window.loginGoogle = async function() {
  try {
    await signInWithPopup(auth, googleProvider);
  } catch(e) {
    document.getElementById('authError').textContent = 'Erreur Google. Réessayez.';
  }
}

window.logout = async function() {
  if (unsubClients) unsubClients();
  if (unsubDocs) unsubDocs();
  await signOut(auth);
  closeProfile();
}

// ─── ONBOARDING ───────────────────────────────────────────────────────────────
window.saveOnboarding = async function() {
  const company = document.getElementById('ob_company').value.trim();
  if (!company) { document.getElementById('obError').textContent = 'Le nom de l\'entreprise est requis.'; return; }
  const data = {
    company,
    prenom: document.getElementById('ob_prenom').value,
    nom: document.getElementById('ob_nom').value,
    adresse: document.getElementById('ob_adresse').value,
    cp: document.getElementById('ob_cp').value,
    ville: document.getElementById('ob_ville').value,
    siret: document.getElementById('ob_siret').value,
    tel: document.getElementById('ob_tel').value,
    email: document.getElementById('ob_email2').value || currentUser.email,
    plan: 'free',
    createdAt: serverTimestamp()
  };
  await setDoc(doc(db,'users',currentUser.uid), data);
  userProfile = data;
  startListeners(currentUser.uid);
  showScreen('appScreen');
  updateHeaderUI();
  navigate('dashboard');
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
window.navigate = function(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('nav-'+tab);
  if (el) el.classList.add('active');
  if (tab==='dashboard') renderDashboard();
  else if (tab==='clients') renderClients();
  else if (tab==='factures') renderDocs('facture');
  else if (tab==='devis') renderDocs('devis');
  else if (tab==='compte') renderCompte();
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDashboard() {
  const factures = documents.filter(d=>d.type==='facture');
  const devis = documents.filter(d=>d.type==='devis');
  const totalTTC = factures.reduce((s,d)=>s+getTTC(d),0);
  const payeTTC = factures.filter(d=>d.paye).reduce((s,d)=>s+getTTC(d),0);
  const used = docsThisMonth();
  const limit = getLimit('docsPerMonth');
  const clientLimit = getLimit('clients');

  document.getElementById('mainContent').innerHTML = `
    ${!isPro() ? `<div class="limit-banner">
      <span style="font-size:20px">⚡</span>
      <div class="limit-banner-text">Plan Gratuit : ${used}/${limit} documents ce mois · ${clients.length}/${clientLimit} clients</div>
      <button class="btn btn-orange btn-sm" onclick="navigate('compte')">Passer Pro</button>
    </div>` : ''}

    <div class="stat-grid">
      <div class="stat-card" style="border-top:4px solid var(--primary)">
        <div class="stat-label">Clients</div>
        <div class="stat-value" style="color:var(--primary)">${clients.length}</div>
        <div class="stat-sub">${isPro()?'illimités':clients.length+'/'+clientLimit}</div>
      </div>
      <div class="stat-card" style="border-top:4px solid var(--orange)">
        <div class="stat-label">Factures</div>
        <div class="stat-value" style="color:var(--orange)">${factures.length}</div>
        <div class="stat-sub">${factures.filter(d=>d.paye).length} réglée(s)</div>
      </div>
      <div class="stat-card" style="border-top:4px solid #9B59B6">
        <div class="stat-label">Devis</div>
        <div class="stat-value" style="color:#9B59B6">${devis.length}</div>
        <div class="stat-sub">en cours</div>
      </div>
      <div class="stat-card" style="border-top:4px solid var(--green)">
        <div class="stat-label">CA TTC</div>
        <div class="stat-value" style="color:var(--green);font-size:19px">${totalTTC.toFixed(0)}€</div>
        <div class="stat-sub">${payeTTC.toFixed(0)}€ encaissé</div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-ai" onclick="openAI()">✨ Générer par IA</button>
      <button class="btn btn-orange" onclick="openNewDoc('facture')">+ Facture</button>
      <button class="btn" style="background:#f0eeff;color:var(--primary);border:1.5px solid var(--border)" onclick="openNewDoc('devis')">+ Devis</button>
    </div>

    <div class="section-header">
      <div class="section-title">Documents récents</div>
    </div>
    ${documents.length===0 ? `<div class="empty"><div class="empty-icon">📄</div>Aucun document.<br>Utilisez "Générer par IA" !</div>` :
      documents.slice(0,6).map(d=>docItem(d)).join('')}
  `;
}

function renderClients() {
  const atLimit = !isPro() && clients.length >= getLimit('clients');

    <div class="section-header">
      <div class="section-title">Clients (${clients.length})</div>

    ${clients.length===0?`<div class="empty"><div class="empty-icon">👥</div>Aucun client enregistré.</div>`:

// ─── DOCS LIST ────────────────────────────────────────────────────────────────
function renderDocs(type) {
  const filtered = documents.filter(d=>d.type===type);
  const label = type==='facture'?'Factures':'Devis';
  const atLimit = !isPro() && docsThisMonth() >= getLimit('docsPerMonth');
  document.getElementById('mainContent').innerHTML = `
    <div class="section-header">
      <div class="section-title">${label} (${filtered.length})</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ai btn-sm" onclick="openAI()">✨ IA</button>

      </div>
    </div>
    ${atLimit?`<div class="limit-banner"><span>🔒</span><div class="limit-banner-text">Limite de ${getLimit('docsPerMonth')} documents/mois atteinte.</div><button class="btn btn-orange btn-sm" onclick="navigate('compte')">Passer Pro</button></div>`:''}
    ${filtered.length===0?`<div class="empty"><div class="empty-icon">${type==='facture'?'🧾':'📋'}</div>Aucun ${type}.</div>`:

}

    </div>
    ${actions?`<div style="display:flex;gap:8px;flex-wrap:wrap">

      <button class="btn btn-sm" style="background:#f0eeff;color:var(--primary)" onclick="openDocForm('${d.id}')">✏️ Modifier</button>

      <button class="btn btn-icon btn-sm" style="background:#fff0f0" onclick="deleteDoc('${d.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H8L5 6"/></svg></button>

      </div>

      <div class="card">
        <div class="card-title">Prestations</div>

function ligneHtml(l,i) {
  return `<div class="ligne-item" id="lg_${i}">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <input style="flex:1;border-radius:8px;border:1.5px solid var(--border);padding:8px 10px;font-size:13px;outline:none;font-family:inherit" placeholder="Désignation" value="${l.description||''}" oninput="updateTotaux()"/>
      <button class="btn btn-icon" style="background:#fff0f0;flex-shrink:0" onclick="removeLigne(${i})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H8L5 6"/></svg></button>
    </div>
    <input style="width:100%;border-radius:8px;border:1.5px solid var(--border);padding:7px 10px;font-size:12px;outline:none;color:#888;margin-bottom:8px;font-family:inherit" placeholder="Détail (optionnel)" value="${l.detail||''}"/>
    <div style="display:flex;gap:8px">
      <div style="flex:1;text-align:center"><div style="font-size:10px;color:var(--muted);margin-bottom:3px">QTÉ</div><input type="number" value="${l.qte||1}" oninput="updateTotaux()" style="text-align:center;border-radius:8px;border:1.5px solid var(--border);padding:8px;font-size:13px;outline:none;font-family:inherit"/></div>
      <div style="flex:1;text-align:center"><div style="font-size:10px;color:var(--muted);margin-bottom:3px">PU HT (€)</div><input type="number" value="${l.pu||0}" oninput="updateTotaux()" style="text-align:right;border-radius:8px;border:1.5px solid var(--border);padding:8px;font-size:13px;outline:none;font-family:inherit"/></div>
      <div style="flex:1;text-align:center"><div style="font-size:10px;color:var(--muted);margin-bottom:3px">TOTAL HT</div><div id="lt_${i}" style="padding:10px 4px;font-weight:700;color:var(--primary);font-size:13px">${((l.qte||1)*(l.pu||0)).toFixed(2)}€</div></div>
    </div>
  </div>`;
}

window.addLigne = function() {
  const box = document.getElementById('lignesBox');
  const i = box.children.length;
  const div = document.createElement('div');
  div.innerHTML = ligneHtml({description:'',detail:'',qte:1,pu:0},i);
  box.appendChild(div.firstElementChild);
  updateTotaux();
}

window.removeLigne = function(i) {
  const el = document.getElementById('lg_'+i);
  if (el) { el.remove(); updateTotaux(); }
}

function updateTotaux() {
  let ht = 0;
  document.querySelectorAll('.ligne-item').forEach((el,i) => {
    const nums = el.querySelectorAll('input[type=number]');
    const q = parseFloat(nums[0]?.value||1);
    const p = parseFloat(nums[1]?.value||0);
    const t = q*p;
    ht += t;
    const lt = document.getElementById('lt_'+i);
    if (lt) lt.textContent = t.toFixed(2)+'€';
  });
  const tva = ht*0.2, ttc = ht+tva;
  const e1=document.getElementById('totalHT'),e2=document.getElementById('totalTVA'),e3=document.getElementById('totalTTC');
  if(e1)e1.textContent=ht.toFixed(2)+' €';
  if(e2)e2.textContent=tva.toFixed(2)+' €';
  if(e3)e3.textContent=ttc.toFixed(2)+' €';
}

window.onClientChange = function() { updateClientInfo(document.getElementById('d_clientId')?.value); }
function updateClientInfo(id) {
  const c = clients.find(x=>x.id===id);
  const el = document.getElementById('clientInfo');
  if (!el) return;
  if (c) { el.style.display='block'; el.innerHTML=`<b>${c.prenom||''} ${c.nom||''}</b><br>${c.adresse||''}, ${c.cp||''} ${c.ville||''}${c.tel?'<br>'+c.tel:''}`; }
  else el.style.display='none';
}

window.togglePaye = function() {

  if (el) el.style.display = document.getElementById('d_paye')?.checked?'block':'none';
}

window.aiDesc = async function() {
  const objet = document.getElementById('d_objet')?.value;
  if (!objet) { alert('Remplis l\'objet d\'abord.'); return; }
  const btn = document.querySelector('[onclick="aiDesc()"]');
  if (btn) btn.textContent='⏳...';
  const r = await callAI(`Tu es un assistant pro. Rédige une description sinistre pour assureur (3-4 phrases) pour : "${objet}". Texte uniquement.`);
  const el = document.getElementById('d_sinistre');
  if (el) el.value=r.trim();
  if (btn) btn.innerHTML='✨ IA';
}

function getLignes() {
  const lignes = [];
  document.querySelectorAll('.ligne-item').forEach(el => {
    const inputs = el.querySelectorAll('input:not([type=number])');
    const nums = el.querySelectorAll('input[type=number]');
    const desc = inputs[0]?.value||'';
    const detail = inputs[1]?.value||'';
    const qte = parseFloat(nums[0]?.value||1);
    const pu = parseFloat(nums[1]?.value||0);
    if (desc) lignes.push({description:desc,detail,qte,pu});
  });
  return lignes;
}

  const lignes = getLignes();
  const clientId = document.getElementById('d_clientId')?.value||'';
  const client = clients.find(x=>x.id===clientId);
  const data = {
    type: window._doc?.type||'facture',
    numero: document.getElementById('d_num')?.value||'',

    clientAdresse:client?.adresse||'', clientCp:client?.cp||'', clientVille:client?.ville||'', clientTel:client?.tel||'',
    lignes,
    paye: document.getElementById('d_paye')?.checked||false,
    datePaiement: document.getElementById('d_datepay')?.value||'',

      <div><div class="modal-title">Génération IA</div><div style="color:rgba(255,255,255,0.6);font-size:11px">Décris l'intervention</div></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <textarea id="ai_prompt" placeholder="Ex: Facture pour Martin Dubois, dépannage électrique urgence nuit, panne tableau électrique, 2h de travail, 80€ de fournitures, total 350€ payé..." style="min-height:120px"></textarea>
      <button class="btn btn-ai" style="width:100%;margin-top:12px;justify-content:center" onclick="runAI()">✨ Générer</button>
      <div id="aiResult"></div>
    </div>
  `);
}

window.runAI = async function() {
  const prompt = document.getElementById('ai_prompt')?.value;
  if (!prompt?.trim()) return;
  const btn = document.querySelector('[onclick="runAI()"]');
  if (btn) btn.innerHTML='⏳ En cours...';

  const clientList = clients.map(c=>`- ${c.prenom||''} ${c.nom||''}, ${c.ville||''} (id:${c.id})`).join('\n');
  const res = await callAI(`Assistant pour application de facturation. Retourne UNIQUEMENT un JSON valide sans markdown.
Clients: ${clientList||'Aucun'}
Demande: "${prompt}"
JSON: {"type":"facture","objet":"","clientId":"id si trouvé sinon vide","clientNom":"","clientPrenom":"","lignes":[{"description":"","detail":"","qte":1,"pu":0}],"descSinistre":"","travauxSuite":"","paye":false,"datePaiement":"","suggestions":""}`);

  try {
    const data = JSON.parse(res.replace(/```json|```/g,'').trim());
    const el = document.getElementById('aiResult');
    if (el) el.innerHTML=`
      <div style="background:#f0faf5;border:1.5px solid #aed6ae;border-radius:12px;padding:14px;margin-top:14px">
        <div style="color:var(--green);font-weight:700;font-size:13px;margin-bottom:8px">✔ Généré !</div>
        <div style="font-size:13px;margin-bottom:4px"><b>Type :</b> ${data.type==='facture'?'Facture':'Devis'}</div>
        <div style="font-size:13px;margin-bottom:4px"><b>Objet :</b> ${data.objet}</div>
        <div style="font-size:13px;margin-bottom:8px"><b>Lignes :</b> ${data.lignes?.length}</div>
        ${data.suggestions?`<div style="font-size:12px;color:#666;font-style:italic;margin-bottom:10px">💡 ${data.suggestions}</div>`:''}
        <button class="btn btn-green" style="width:100%;justify-content:center" onclick='applyAI(${JSON.stringify(JSON.stringify(data))})'>Ouvrir dans l'éditeur →</button>
      </div>`;
    if (btn) btn.innerHTML='✨ Générer';
  } catch(e) {
    alert('Erreur IA. Réessaie.'); if (btn) btn.innerHTML='✨ Générer';
  }
}

window.applyAI = function(dataStr) {
  const data = JSON.parse(dataStr);
  closeModal();
  editingDoc = null;
  window._doc = { type:data.type||'facture', numero:nextNumero(data.type||'facture'), date:today(), dateIntervention:today(), ...data };
  showDocForm(window._doc);
  setTimeout(()=>{ const sel=document.getElementById('d_clientId'); if(sel&&data.clientId){sel.value=data.clientId;updateClientInfo(data.clientId);} },100);
}

window.showUpgrade = function() { navigate('compte'); }

// ─── AI CALL ──────────────────────────────────────────────────────────────────
async function callAI(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, messages:[{role:'user',content:prompt}] })
  });
  const d = await res.json();
  return d.content?.map(b=>b.text||'').join('')||'';
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function getTTC(d) {
  return (d.lignes||[]).reduce((s,l)=>s+(parseFloat(l.qte)||0)*(parseFloat(l.pu)||0),0)*1.2;
}
function nextNumero(type) {
  const y=new Date().getFullYear(), p=type==='facture'?'F':'D';
  const n=documents.filter(d=>d.type===type&&(d.numero||'').startsWith(p+y)).length+1;
  return `${p}${y}-${n.toString().padStart(3,'0')}`;
}
function today() { return new Date().toLocaleDateString('fr-FR'); }

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modalContent').innerHTML=html;
  document.getElementById('modalOverlay').classList.add('open');
}
window.closeModal = function() { document.getElementById('modalOverlay').classList.remove('open'); }
window.closeModalOutside = function(e) { if(e.target===document.getElementById('modalOverlay'))closeModal(); }

// ─── PROFILE ──────────────────────────────────────────────────────────────────
window.toggleProfile = function() { document.getElementById('profileMenu').classList.toggle('open'); }
window.closeProfile = function() { document.getElementById('profileMenu').classList.remove('open'); }
</script>
