<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Easy Facture</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Easy Facture"/>
  <meta name="theme-color" content="#1a1a2e"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --p: #5B4FE8;
      --p2: #7B6FF0;
      --p3: #EEF0FF;
      --acc: #FF6B6B;
      --grn: #06D6A0;
      --gold: #FFB703;
      --bg: #F8F8FC;
      --card: #fff;
      --text: #12111A;
      --muted: #8884A8;
      --border: #EAEAF5;
      --r: 16px;
      --sh: 0 2px 20px rgba(91,79,232,0.08);
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    button,input,select,textarea { font-family:'DM Sans',sans-serif; }

    /* ─── SCREENS ─── */
    .screen { display:none; min-height:100vh; }
    .screen.active { display:flex; flex-direction:column; }

    /* ─── AUTH ─── */
    #authScreen {
      background:#12111A;
      align-items:center; justify-content:center;
      padding:24px; position:relative; overflow:hidden;
    }
    .auth-bg {
      position:absolute; inset:0; pointer-events:none;
      background: radial-gradient(ellipse at 20% 20%, rgba(91,79,232,0.35) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 80%, rgba(255,107,107,0.2) 0%, transparent 60%),
                  radial-gradient(ellipse at 50% 50%, rgba(6,214,160,0.1) 0%, transparent 70%);
    }
    .auth-dots {
      position:absolute; inset:0; pointer-events:none;
      background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    .auth-box { width:100%; max-width:400px; z-index:1; }
    .auth-brand { text-align:center; margin-bottom:32px; }
    .auth-icon {
      width:68px; height:68px; margin:0 auto 14px;
      background:linear-gradient(135deg,var(--p),var(--acc));
      border-radius:20px; display:flex; align-items:center; justify-content:center;
      box-shadow:0 8px 32px rgba(91,79,232,0.5);
      animation: floatIcon 3s ease-in-out infinite;
    }
    @keyframes floatIcon { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    .auth-brand h1 { font-family:'DM Serif Display',serif; font-size:30px; color:#fff; letter-spacing:-0.5px; }
    .auth-brand p { color:rgba(255,255,255,0.4); font-size:13px; margin-top:4px; }
    .auth-card {
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:24px; padding:28px 24px;
    }
    .auth-tabs { display:flex; background:rgba(255,255,255,0.06); border-radius:12px; padding:4px; margin-bottom:22px; }
    .auth-tab { flex:1; padding:10px; text-align:center; border-radius:9px; font-size:14px; font-weight:600; color:rgba(255,255,255,0.4); cursor:pointer; transition:all .2s; }
    .auth-tab.active { background:var(--p); color:#fff; box-shadow:0 4px 14px rgba(91,79,232,0.4); }
    .input-wrap { position:relative; margin-bottom:12px; }
    .auth-input {
      width:100%; background:rgba(255,255,255,0.08);
      border:1.5px solid rgba(255,255,255,0.12);
      border-radius:12px; padding:13px 16px; font-size:14px;
      color:#fff; outline:none; transition:border-color .2s;
    }
    .auth-input::placeholder { color:rgba(255,255,255,0.3); }
    .auth-input:focus { border-color:var(--p); }
    .input-eye {
      position:absolute; right:14px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer; color:rgba(255,255,255,0.4);
      padding:4px; display:flex; align-items:center;
    }
    .auth-forgot { text-align:right; margin-bottom:16px; margin-top:-6px; }
    .auth-forgot a { color:rgba(255,255,255,0.4); font-size:12px; cursor:pointer; text-decoration:none; }
    .auth-forgot a:hover { color:var(--p2); }
    .auth-btn {
      width:100%; background:linear-gradient(135deg,var(--p),var(--p2));
      border:none; color:#fff; border-radius:12px; padding:14px;
      font-size:15px; font-weight:700; cursor:pointer;
      box-shadow:0 6px 20px rgba(91,79,232,0.4);
      transition:transform .15s, box-shadow .15s;
    }
    .auth-btn:active { transform:scale(0.97); }
    .auth-btn:disabled { opacity:0.6; cursor:not-allowed; }
    .auth-divider { display:flex; align-items:center; gap:10px; margin:16px 0; }
    .auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.1); }
    .auth-divider span { color:rgba(255,255,255,0.3); font-size:12px; }
    .google-btn {
      width:100%; background:#fff; border:none; color:#333;
      border-radius:12px; padding:13px; font-size:14px; font-weight:600;
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;
      transition:transform .15s;
    }
    .google-btn:active { transform:scale(0.97); }
    .auth-msg { min-height:20px; margin-top:10px; text-align:center; font-size:12px; font-weight:500; }
    .auth-msg.error { color:#FF6B6B; }
    .auth-msg.success { color:var(--grn); }

    /* ─── ONBOARDING ─── */
    #onboardScreen { background:#12111A; align-items:center; justify-content:center; padding:24px; }
    .onboard-box { width:100%; max-width:440px; }
    .onboard-step { color:rgba(255,255,255,0.4); font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
    .onboard-title { color:#fff; font-family:'DM Serif Display',serif; font-size:26px; margin-bottom:6px; }
    .onboard-sub { color:rgba(255,255,255,0.45); font-size:14px; margin-bottom:28px; }
    .ob-input {
      width:100%; background:rgba(255,255,255,0.08); border:1.5px solid rgba(255,255,255,0.12);
      border-radius:12px; padding:13px 16px; font-size:14px; color:#fff; outline:none;
      margin-bottom:10px; transition:border-color .2s;
    }
    .ob-input::placeholder { color:rgba(255,255,255,0.3); }
    .ob-input:focus { border-color:var(--p); }
    .ob-row { display:flex; gap:10px; }
    .ob-row .ob-input { flex:1; }
    .tva-choice { margin-bottom:10px; }
    .tva-choice label { display:block; color:rgba(255,255,255,0.6); font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
    .tva-options { display:flex; gap:8px; }
    .tva-opt {
      flex:1; padding:10px 8px; border-radius:10px; text-align:center;
      border:1.5px solid rgba(255,255,255,0.12); cursor:pointer;
      color:rgba(255,255,255,0.5); font-size:13px; font-weight:600;
      background:rgba(255,255,255,0.05); transition:all .2s;
    }
    .tva-opt.active { border-color:var(--p); background:rgba(91,79,232,0.2); color:#fff; }

    /* ─── APP ─── */
    #appScreen { padding-bottom:72px; }
    .app-header {
      background:linear-gradient(135deg,var(--p) 0%,#4A3FD8 100%);
      padding:12px 18px 14px; position:sticky; top:0; z-index:100;
      box-shadow:0 4px 20px rgba(91,79,232,0.25);
    }
    .header-row { display:flex; align-items:center; gap:10px; }
    .header-logo { font-family:'DM Serif Display',serif; font-size:19px; color:#fff; letter-spacing:-0.3px; }
    .header-badge {
      background:rgba(255,255,255,0.2); border-radius:20px;
      padding:3px 9px; font-size:10px; font-weight:700; color:#fff;
    }
    .header-badge.pro { background:var(--gold); color:#333; }
    .header-sync { display:flex; align-items:center; gap:5px; color:rgba(255,255,255,0.55); font-size:11px; }
    .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--grn); animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
    .header-av {
      width:34px; height:34px; border-radius:17px;
      background:rgba(255,255,255,0.2); display:flex; align-items:center;
      justify-content:center; color:#fff; font-weight:700; font-size:14px;
      cursor:pointer; margin-left:auto;
    }
    .header-company { color:rgba(255,255,255,0.6); font-size:11px; margin-top:3px; font-weight:500; }

    /* NAV */
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0; z-index:100;
      background:#fff; border-top:1px solid var(--border);
      display:flex; padding:6px 0 calc(6px + env(safe-area-inset-bottom));
      box-shadow:0 -4px 20px rgba(0,0,0,0.06);
    }
    .nav-btn { flex:1; background:none; border:none; padding:8px 4px 4px; display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10px; font-weight:600; color:#bbb; cursor:pointer; transition:color .2s; }
    .nav-btn.active { color:var(--p); }
    .nav-btn svg { transition:transform .2s; }
    .nav-btn.active svg { transform:scale(1.15); }

    /* CONTENT */
    .content { padding:18px 16px 10px; max-width:700px; margin:0 auto; }

    /* CARDS */
    .card { background:var(--card); border-radius:var(--r); padding:18px; box-shadow:var(--sh); margin-bottom:14px; border:1px solid var(--border); }
    .card-title { font-weight:700; color:var(--p); font-size:14px; margin-bottom:14px; }

    /* STATS */
    .stat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px; }
    .stat-card { background:var(--card); border-radius:14px; padding:16px; box-shadow:var(--sh); border:1px solid var(--border); position:relative; overflow:hidden; }
    .stat-card::before { content:''; position:absolute; top:-20px; right:-20px; width:80px; height:80px; border-radius:50%; opacity:0.07; }
    .stat-card:nth-child(1)::before { background:var(--p); }
    .stat-card:nth-child(2)::before { background:var(--acc); }
    .stat-card:nth-child(3)::before { background:#9B59B6; }
    .stat-card:nth-child(4)::before { background:var(--grn); }
    .stat-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
    .stat-val { font-size:26px; font-weight:800; margin-top:4px; }
    .stat-sub { font-size:11px; color:var(--muted); margin-top:2px; }

    /* BUTTONS */
    .btn { border-radius:12px; padding:11px 18px; font-weight:700; font-size:13px; display:inline-flex; align-items:center; gap:7px; cursor:pointer; border:none; transition:all .15s; }
    .btn:active { transform:scale(0.96); }
    .btn-primary { background:var(--p); color:#fff; box-shadow:0 4px 14px rgba(91,79,232,0.3); }
    .btn-acc { background:var(--acc); color:#fff; box-shadow:0 4px 14px rgba(255,107,107,0.3); }
    .btn-grn { background:var(--grn); color:#fff; }
    .btn-ghost { background:var(--bg); color:var(--text); border:1.5px solid var(--border); }
    .btn-ai {
      background:linear-gradient(135deg,var(--p),#9B59B6);
      color:#fff; box-shadow:0 4px 14px rgba(91,79,232,0.35);
      position:relative; overflow:hidden;
    }
    .btn-ai::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
      transform:translateX(-100%); transition:transform 0.4s;
    }
    .btn-ai:hover::after { transform:translateX(100%); }
    .btn-sm { padding:7px 13px; font-size:12px; border-radius:10px; }
    .btn-icon { width:36px; height:36px; padding:0; border-radius:10px; justify-content:center; }
    .btn-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }

    /* SECTION */
    .sec-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .sec-title { font-weight:800; color:var(--text); font-size:17px; }

    /* LIST */
    .list-item { background:var(--card); border-radius:14px; padding:14px 16px; box-shadow:var(--sh); margin-bottom:10px; border:1px solid var(--border); }

    /* BADGE */
    .badge { font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; display:inline-block; }
    .badge-grn { background:#e8fff7; color:var(--grn); }
    .badge-acc { background:#fff0f0; color:var(--acc); }
    .badge-p { background:var(--p3); color:var(--p); }
    .badge-gold { background:#fff8dc; color:#B8860B; }

    /* FORMS */
    .form-group { margin-bottom:14px; }
    .form-row { display:flex; gap:10px; }
    .form-row .form-group { flex:1; min-width:0; }
    label { display:block; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; }
    input,textarea,select { width:100%; border-radius:10px; border:1.5px solid var(--border); padding:11px 13px; font-size:14px; outline:none; background:#fff; transition:border-color .2s; color:var(--text); }
    input:focus,textarea:focus,select:focus { border-color:var(--p); }
    textarea { resize:vertical; min-height:80px; }

    /* TVA SELECTOR */
    .tva-rate-selector { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
    .tva-rate-btn {
      padding:7px 12px; border-radius:9px; font-size:12px; font-weight:700;
      border:1.5px solid var(--border); cursor:pointer; background:#fff;
      color:var(--muted); transition:all .2s;
    }
    .tva-rate-btn.active { border-color:var(--p); background:var(--p3); color:var(--p); }
    .tva-custom-input { display:none; width:80px; border-radius:9px; border:1.5px solid var(--p); padding:7px 10px; font-size:13px; outline:none; }
    .tva-custom-input.show { display:inline-block; }

    /* LIGNE */
    .ligne-item { background:var(--bg); border-radius:12px; padding:12px; margin-bottom:8px; border:1px solid var(--border); }

    /* TOTAUX */
    .totaux { border-top:1.5px solid var(--border); padding-top:12px; margin-top:10px; }
    .total-row { display:flex; justify-content:space-between; font-size:13px; color:var(--muted); margin-bottom:5px; }
    .total-ttc { background:var(--p); color:#fff; border-radius:10px; padding:11px 14px; display:flex; justify-content:space-between; font-weight:800; font-size:15px; margin-top:8px; }

    /* MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:500; display:none; align-items:flex-end; backdrop-filter:blur(4px); }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--bg); border-radius:24px 24px 0 0; width:100%; max-height:93vh; overflow-y:auto; padding-bottom:env(safe-area-inset-bottom); }
    .modal-header { background:linear-gradient(135deg,var(--p),#4A3FD8); padding:18px 20px; border-radius:24px 24px 0 0; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:10; }
    .modal-title { color:#fff; font-weight:800; font-size:16px; }
    .modal-close { margin-left:auto; background:rgba(255,255,255,0.2); border:none; color:#fff; border-radius:10px; width:34px; height:34px; font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .modal-body { padding:20px; }

    /* AI LOADING */
    .ai-loading {
      display:none; flex-direction:column; align-items:center;
      justify-content:center; padding:40px 20px; gap:16px;
    }
    .ai-loading.show { display:flex; }
    .ai-spinner {
      width:56px; height:56px; position:relative;
    }
    .ai-spinner::before,.ai-spinner::after {
      content:''; position:absolute; inset:0; border-radius:50%;
      border:3px solid transparent;
    }
    .ai-spinner::before { border-top-color:var(--p); animation:spin1 1s linear infinite; }
    .ai-spinner::after { border-bottom-color:var(--acc); animation:spin1 1.5s linear infinite reverse; inset:6px; }
    @keyframes spin1 { to { transform:rotate(360deg); } }
    .ai-loading-text { font-size:15px; font-weight:700; color:var(--p); text-align:center; }
    .ai-loading-sub { font-size:12px; color:var(--muted); text-align:center; animation:fadeInOut 2s infinite; }
    @keyframes fadeInOut { 0%,100%{opacity:0.4}50%{opacity:1} }
    .ai-dots span { animation:dotPulse 1.4s infinite; display:inline-block; }
    .ai-dots span:nth-child(2) { animation-delay:.2s; }
    .ai-dots span:nth-child(3) { animation-delay:.4s; }
    @keyframes dotPulse { 0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)} }

    /* AI RESULT */
    .ai-result { background:#f0faf5; border:1.5px solid #aed6ae; border-radius:12px; padding:16px; margin-top:14px; animation:slideUp .3s ease; }
    @keyframes slideUp { from{transform:translateY(10px);opacity:0} to{transform:translateY(0);opacity:1} }

    /* PREVIEW */
    .preview-overlay { position:fixed; inset:0; background:#111; z-index:600; display:none; flex-direction:column; }
    .preview-overlay.open { display:flex; }
    .preview-bar { background:var(--p); padding:12px 16px; display:flex; align-items:center; gap:10px; flex-shrink:0; padding-top:calc(12px + env(safe-area-inset-top)); }
    .preview-frame { flex:1; border:none; }

    /* LIMIT */
    .limit-banner { background:linear-gradient(135deg,#fff4ee,#fff8dc); border:1.5px solid var(--acc); border-radius:12px; padding:12px 14px; margin-bottom:16px; display:flex; align-items:center; gap:10px; }

    /* PROFILE */
    .profile-menu { position:fixed; inset:0; z-index:400; display:none; }
    .profile-menu.open { display:block; }
    .profile-panel { position:absolute; top:68px; right:16px; background:#fff; border-radius:16px; padding:8px; box-shadow:0 8px 40px rgba(0,0,0,0.15); border:1px solid var(--border); min-width:210px; }
    .profile-item { padding:12px 14px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:10px; }
    .profile-item:hover { background:var(--bg); }

    /* PLAN CARDS */
    .plan-card { border-radius:16px; padding:20px; margin-bottom:12px; border:2px solid var(--border); position:relative; overflow:hidden; }
    .plan-card.pro { border-color:var(--p); background:linear-gradient(135deg,var(--p3),#fff); }
    .plan-card.team { border-color:var(--acc); background:linear-gradient(135deg,#fff0f0,#fff); }

    /* LOADING */
    .loading { display:flex; align-items:center; justify-content:center; height:200px; flex-direction:column; gap:12px; color:var(--muted); }
    .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--p); border-radius:50%; animation:spin1 .8s linear infinite; }
    .empty { text-align:center; padding:50px 20px; color:var(--muted); }
    .empty-icon { font-size:48px; margin-bottom:12px; }
    .avatar { width:42px; height:42px; border-radius:21px; background:linear-gradient(135deg,var(--p),var(--p2)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:16px; flex-shrink:0; }
    .check-row { display:flex; align-items:center; gap:10px; cursor:pointer; padding:6px 0; }
    .check-row input[type=checkbox] { width:20px; height:20px; accent-color:var(--grn); flex-shrink:0; }

    /* TOAST */
    .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:#12111A; color:#fff; padding:12px 20px; border-radius:12px; font-size:13px; font-weight:600; z-index:900; opacity:0; transition:all .3s; pointer-events:none; white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ── AUTH ── -->
<div id="authScreen" class="screen active">
  <div class="auth-bg"></div>
  <div class="auth-dots"></div>
  <div class="auth-box">
    <div class="auth-brand">
      <div class="auth-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </div>
      <h1>Easy Facture</h1>
      <p>Devis & Factures pour les pros</p>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Connexion</div>
        <div class="auth-tab" id="tabRegister" onclick="switchTab('register')">Inscription</div>
      </div>

      <!-- LOGIN -->
      <div id="loginForm">
        <div class="input-wrap">
          <input class="auth-input" id="l_email" type="email" placeholder="Adresse email"/>
        </div>
        <div class="input-wrap">
          <input class="auth-input" id="l_pass" type="password" placeholder="Mot de passe"/>
          <button class="input-eye" onclick="togglePwd('l_pass',this)" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="auth-forgot"><a onclick="forgotPassword()">Mot de passe oublié ?</a></div>
        <button class="auth-btn" id="loginBtn" onclick="doLogin()">Se connecter</button>
      </div>

      <!-- REGISTER -->
      <div id="registerForm" style="display:none">

          <button class="input-eye" onclick="togglePwd('r_pass',this)" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>

      <button class="google-btn" onclick="doGoogle()">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continuer avec Google

</div>

<!-- ── ONBOARDING ── -->
<div id="onboardScreen" class="screen">
  <div style="background:linear-gradient(160deg,#12111A,#1e1b4b);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="onboard-box">

<!-- MODALS -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modalContent"></div>
</div>
<div class="preview-overlay" id="previewOverlay">

    <span id="previewTitle" style="color:#fff;font-weight:700;font-size:14px;margin-left:8px;"></span>
    <button onclick="printPreview()" style="margin-left:auto;background:var(--acc);border:none;color:#fff;border-radius:10px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;">🖨️ PDF</button>
  </div>
  <iframe id="previewFrame" class="preview-frame"></iframe>
</div>
<div class="profile-menu" id="profileMenu" onclick="closeProfile()">
  <div class="profile-panel" onclick="event.stopPropagation()">
    <div style="padding:12px 14px;border-bottom:1px solid var(--border);margin-bottom:4px">
      <div style="font-weight:800;font-size:14px" id="profileName"></div>
      <div style="font-size:11px;color:var(--muted)" id="profileEmail"></div>
    </div>
    <div class="profile-item" onclick="navigate('compte');closeProfile()">⚙️ Mon compte</div>
    <div class="profile-item" onclick="navigate('compte');closeProfile()">💎 Passer Pro</div>
    <div class="profile-item" style="color:var(--acc)" onclick="doLogout()">🚪 Déconnexion</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, getDoc, setDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCAp2wPf9G0IDFDmw6Fpg2FDI0oepF6kyU",
  authDomain: "esay-facture.firebaseapp.com",
  projectId: "esay-facture",
  storageBucket: "esay-facture.firebasestorage.app",
  messagingSenderId: "282351825017",
  appId: "1:282351825017:web:0f0c6fddedc56f81f5a4a8"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const gProvider = new GoogleAuthProvider();

// STATE
let user = null, profile = null, clients = [], documents = [], tab = 'dashboard';
let editingDoc = null, editingClient = null;
let unsubC = null, unsubD = null;
let tvaRegime = true; // true = assujetti, false = micro

const LIMITS = { free:{clients:3,docs:5}, pro:{clients:Infinity,docs:Infinity}, team:{clients:Infinity,docs:Infinity} };
const isPro = () => profile?.plan === 'pro' || profile?.plan === 'team';
const getLimit = k => LIMITS[profile?.plan||'free'][k];
const docsThisMonth = () => { const n=new Date(); return documents.filter(d=>{ const t=d.createdAt?.toDate?.(); return t&&t.getMonth()===n.getMonth()&&t.getFullYear()===n.getFullYear(); }).length; };

// TOAST
function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// AUTH UI
window.switchTab = t => {
  document.getElementById('tabLogin').classList.toggle('active', t==='login');
  document.getElementById('tabRegister').classList.toggle('active', t==='register');
  document.getElementById('loginForm').style.display = t==='login'?'block':'none';
  document.getElementById('registerForm').style.display = t==='register'?'block':'none';
  document.getElementById('authMsg').textContent = '';
}
window.togglePwd = (id, btn) => {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.innerHTML = show
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}
function setMsg(msg, type='error') {
  const el = document.getElementById('authMsg');
  el.textContent = msg; el.className = `auth-msg ${type}`;
}
function setBtnLoading(id, loading, text) {
  const btn = document.getElementById(id);
  btn.disabled = loading;
  btn.textContent = loading ? '⏳ ' + text + '...' : text;
}

// AUTH ACTIONS
onAuthStateChanged(auth, async u => {
  if (u) { user = u; await loadProfile(u); }
  else { user = null; profile = null; showScreen('authScreen'); }
});

async function loadProfile(u) {
  const snap = await getDoc(doc(db,'users',u.uid));
  if (snap.exists()) {
    profile = snap.data();
    startListeners(u.uid);
    showScreen('appScreen');
    updateHeaderUI();
    navigate('dashboard');
  } else showScreen('onboardScreen');
}

function startListeners(uid) {
  if (unsubC) unsubC(); if (unsubD) unsubD();
  unsubC = onSnapshot(collection(db,'users',uid,'clients'), s => {
    clients = s.docs.map(d=>({id:d.id,...d.data()}));
    if(tab==='clients') renderClients();
    if(tab==='dashboard') renderDashboard();
  });
  unsubD = onSnapshot(query(collection(db,'users',uid,'documents'),orderBy('createdAt','desc')), s => {
    documents = s.docs.map(d=>({id:d.id,...d.data()}));
    if(tab==='dashboard') renderDashboard();
    if(tab==='factures') renderDocs('facture');
    if(tab==='devis') renderDocs('devis');
  });
}

window.doLogin = async () => {
  const e=document.getElementById('l_email').value, p=document.getElementById('l_pass').value;
  if(!e||!p){setMsg('Remplis tous les champs.');return;}
  setBtnLoading('loginBtn',true,'Connexion'); setMsg('');
  try { await signInWithEmailAndPassword(auth,e,p); }
  catch(err) {
    setMsg(err.code==='auth/invalid-credential'?'Email ou mot de passe incorrect.':'Erreur de connexion.');
    setBtnLoading('loginBtn',false,'Se connecter');
  }
}
window.doRegister = async () => {
  const e=document.getElementById('r_email').value, p=document.getElementById('r_pass').value;
  if(!e||!p){setMsg('Remplis tous les champs.');return;}
  if(p.length<6){setMsg('Mot de passe trop court (min 6 caractères).');return;}
  setBtnLoading('registerBtn',true,'Création'); setMsg('');
  try { await createUserWithEmailAndPassword(auth,e,p); }
  catch(err) {
    setMsg(err.code==='auth/email-already-in-use'?'Cet email est déjà utilisé.':'Erreur lors de l\'inscription.');
    setBtnLoading('registerBtn',false,'Créer mon compte');
  }
}
window.doGoogle = async () => {
  setMsg('');
  try { await signInWithPopup(auth,gProvider); }
  catch(err) { setMsg('Erreur Google. Réessayez.'); }
}
window.forgotPassword = async () => {
  const e = document.getElementById('l_email').value;
  if(!e){setMsg('Entre ton email d\'abord.','error');return;}
  try {
    await sendPasswordResetEmail(auth, e);
    setMsg('Email de réinitialisation envoyé ! Vérifie ta boîte mail.','success');
  } catch(err) {
    setMsg('Email introuvable ou invalide.','error');
  }
}
window.doLogout = async () => { if(unsubC)unsubC(); if(unsubD)unsubD(); await signOut(auth); closeProfile(); }

// ONBOARDING
window.setTvaRegime = (val) => {
  tvaRegime = val;
  document.getElementById('tva_yes').classList.toggle('active', val);
  document.getElementById('tva_no').classList.toggle('active', !val);
}
window.saveOnboarding = async () => {
  const company = document.getElementById('ob_company').value.trim();
  if(!company){document.getElementById('obError').textContent='Le nom de l\'entreprise est requis.';return;}
  const data = {
    company, tvaAssujetti: tvaRegime,
    prenom:document.getElementById('ob_prenom').value,
    nom:document.getElementById('ob_nom').value,
    adresse:document.getElementById('ob_adresse').value,
    cp:document.getElementById('ob_cp').value,
    ville:document.getElementById('ob_ville').value,
    siret:document.getElementById('ob_siret').value,
    tel:document.getElementById('ob_tel').value,
    email:document.getElementById('ob_email2').value||user.email,
    plan:'free', createdAt:serverTimestamp()
  };
  await setDoc(doc(db,'users',user.uid), data);
  profile = data;
  startListeners(user.uid);
  showScreen('appScreen');
  updateHeaderUI();
  navigate('dashboard');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function updateHeaderUI() {
  const plan = profile?.plan||'free';
  const badge = document.getElementById('planBadge');
  badge.textContent = plan==='pro'?'PRO':plan==='team'?'ÉQUIPE':'GRATUIT';
  badge.className = 'header-badge'+(isPro()?' pro':'');
  document.getElementById('companyBar').textContent = profile?.company||'';
  document.getElementById('headerAv').textContent = (profile?.prenom?.[0]||user?.email?.[0]||'?').toUpperCase();
  document.getElementById('profileName').textContent = `${profile?.prenom||''} ${profile?.nom||''}`.trim()||'Utilisateur';
  document.getElementById('profileEmail').textContent = user?.email||'';
}

window.navigate = t => {
  tab = t;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const el = document.getElementById('nav-'+t); if(el) el.classList.add('active');
  if(t==='dashboard') renderDashboard();
  else if(t==='clients') renderClients();
  else if(t==='factures') renderDocs('facture');
  else if(t==='devis') renderDocs('devis');
  else if(t==='compte') renderCompte();
}

// HELPERS
function getTVARate(d) {
  if(!d.tvaEnabled) return 0;
  return parseFloat(d.tvaRate||20);
}
function getTTC(d) {
  const ht = (d.lignes||[]).reduce((s,l)=>s+(parseFloat(l.qte)||0)*(parseFloat(l.pu)||0),0);
  const tva = getTVARate(d);
  return ht * (1 + tva/100);
}
function nextNumero(type) {
  const y=new Date().getFullYear(), p=type==='facture'?'F':'D';
  const n=documents.filter(d=>d.type===type&&(d.numero||'').startsWith(p+y)).length+1;
  return `${p}${y}-${n.toString().padStart(3,'0')}`;
}
function today() { return new Date().toLocaleDateString('fr-FR'); }

// DASHBOARD
function renderDashboard() {
  const facs = documents.filter(d=>d.type==='facture');
  const devs = documents.filter(d=>d.type==='devis');
  const totalTTC = facs.reduce((s,d)=>s+getTTC(d),0);
  const payeTTC = facs.filter(d=>d.paye).reduce((s,d)=>s+getTTC(d),0);
  const used = docsThisMonth(), limit = getLimit('docs');
  const cLimit = getLimit('clients');

  document.getElementById('mainContent').innerHTML = `
    ${!isPro()?`<div class="limit-banner">
      <span style="font-size:20px">⚡</span>
      <div style="flex:1;font-size:12px;color:#8B4513;font-weight:600">${used}/${limit} docs ce mois · ${clients.length}/${cLimit} clients</div>
      <button class="btn btn-acc btn-sm" onclick="navigate('compte')">Pro</button>
    </div>`:''}
    <div class="stat-grid">
      <div class="stat-card" style="border-top:4px solid var(--p)">
        <div class="stat-label">Clients</div>
        <div class="stat-val" style="color:var(--p)">${clients.length}</div>
        <div class="stat-sub">${isPro()?'illimités':clients.length+'/'+cLimit}</div>
      </div>
      <div class="stat-card" style="border-top:4px solid var(--acc)">
        <div class="stat-label">Factures</div>
        <div class="stat-val" style="color:var(--acc)">${facs.length}</div>
        <div class="stat-sub">${facs.filter(d=>d.paye).length} réglée(s)</div>
      </div>
      <div class="stat-card" style="border-top:4px solid #9B59B6">
        <div class="stat-label">Devis</div>
        <div class="stat-val" style="color:#9B59B6">${devs.length}</div>
        <div class="stat-sub">en cours</div>
      </div>
      <div class="stat-card" style="border-top:4px solid var(--grn)">
        <div class="stat-label">CA TTC</div>
        <div class="stat-val" style="color:var(--grn);font-size:19px">${totalTTC.toFixed(0)}€</div>
        <div class="stat-sub">${payeTTC.toFixed(0)}€ encaissé</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ai" onclick="openAI()">✨ Générer par IA</button>
      <button class="btn btn-acc" onclick="openNewDoc('facture')">+ Facture</button>
      <button class="btn btn-ghost" onclick="openNewDoc('devis')">+ Devis</button>
    </div>
    <div class="sec-header"><div class="sec-title">Documents récents</div></div>
    ${documents.length===0?`<div class="empty"><div class="empty-icon">📄</div>Aucun document.<br>Utilisez "Générer par IA" !</div>`:
      documents.slice(0,6).map(d=>docItem(d)).join('')}
  `;
}

function renderClients() {
  const atLimit = !isPro() && clients.length >= getLimit('clients');
  document.getElementById('mainContent').innerHTML = `
    <div class="sec-header">
      <div class="sec-title">Clients (${clients.length})</div>
      <button class="btn btn-primary btn-sm" onclick="${atLimit?'showUpgrade()':'openClientForm(null)'}">${atLimit?'🔒 Limite':'+ Nouveau'}</button>
    </div>
    ${atLimit?`<div class="limit-banner"><span>🔒</span><div style="flex:1;font-size:12px;color:#8B4513;font-weight:600">Limite ${getLimit('clients')} clients atteinte</div><button class="btn btn-acc btn-sm" onclick="navigate('compte')">Pro</button></div>`:''}
    ${clients.length===0?`<div class="empty"><div class="empty-icon">👥</div>Aucun client.</div>`:
      clients.map(c=>`
        <div class="list-item" style="display:flex;align-items:center;gap:12px;cursor:pointer" onclick="openClientForm('${c.id}')">
          <div class="avatar">${(c.prenom?.[0]||'?').toUpperCase()}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:14px">${c.prenom||''} ${c.nom||''}</div>
            <div style="font-size:12px;color:var(--muted)">${c.adresse||''} ${c.cp||''} ${c.ville||''}</div>
            ${c.tel?`<div style="font-size:11px;color:var(--muted)">${c.tel}</div>`:''}
          </div>
          <button onclick="event.stopPropagation();deleteClient('${c.id}')" class="btn btn-icon" style="background:#fff0f0;flex-shrink:0">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H8L5 6"/></svg>
          </button>
        </div>`).join('')}
  `;
}

function renderDocs(type) {
  const filtered = documents.filter(d=>d.type===type);
  const atLimit = !isPro() && docsThisMonth() >= getLimit('docs');
  document.getElementById('mainContent').innerHTML = `
    <div class="sec-header">
      <div class="sec-title">${type==='facture'?'Factures':'Devis'} (${filtered.length})</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ai btn-sm" onclick="openAI()">✨ IA</button>
        <button class="btn btn-acc btn-sm" onclick="${atLimit?'showUpgrade()':'openNewDoc(\''+type+'\')'}">+ Nouveau</button>
      </div>
    </div>
    ${atLimit?`<div class="limit-banner"><span>🔒</span><div style="flex:1;font-size:12px;color:#8B4513;font-weight:600">Limite ${getLimit('docs')} docs/mois</div><button class="btn btn-acc btn-sm" onclick="navigate('compte')">Pro</button></div>`:''}

}

window.toggleTVA = () => {
  const enabled = document.getElementById('d_tvaEnabled')?.checked;
  window._tvaEnabled = enabled;
  const box = document.getElementById('tvaRateBox');
  const row = document.getElementById('tvaRow');
  if(box) box.style.display = enabled?'block':'none';
  if(row) row.style.display = enabled?'flex':'none';
  updateTotaux();
}

window.setTvaRate = val => {
  if(val==='custom') {
    document.querySelectorAll('.tva-rate-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tva-rate-btn')[3]?.classList.add('active');
    document.querySelector('.tva-custom-input')?.classList.add('show');
    return;
  }
  window._tvaRate = parseFloat(val)||0;
  document.querySelectorAll('.tva-rate-btn').forEach((b,i)=>b.classList.toggle('active',[5.5,10,20].includes(val)?[5.5,10,20].indexOf(val)===i:false));
  const label = document.getElementById('tvaRateLabel');
  if(label) label.textContent = window._tvaRate;
  updateTotaux();
}

function ligneHtml(l,i) {
  return `<div class="ligne-item" id="lg_${i}">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <input style="flex:1;border-radius:8px;border:1.5px solid var(--border);padding:8px 10px;font-size:13px;outline:none;font-family:inherit" placeholder="Désignation" value="${l.description||''}" oninput="updateTotaux()"/>
      <button class="btn btn-icon" style="background:#fff0f0;flex-shrink:0" onclick="removeLigne(${i})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H8L5 6"/></svg></button>
    </div>
    <input style="width:100%;border-radius:8px;border:1.5px solid var(--border);padding:7px 10px;font-size:12px;outline:none;color:#888;margin-bottom:8px;font-family:inherit" placeholder="Détail (optionnel)" value="${l.detail||''}"/>
    <div style="display:flex;gap:8px">
      <div style="flex:1;text-align:center"><div style="font-size:10px;color:var(--muted);margin-bottom:3px">QTÉ</div><input type="number" value="${l.qte||1}" oninput="updateTotaux()" style="text-align:center;border-radius:8px;border:1.5px solid var(--border);padding:8px;font-size:13px;outline:none;font-family:inherit"/></div>
      <div style="flex:1;text-align:center"><div style="font-size:10px;color:var(--muted);margin-bottom:3px">PU HT (€)</div><input type="number" value="${l.pu||0}" oninput="updateTotaux()" style="text-align:right;border-radius:8px;border:1.5px solid var(--border);padding:8px;font-size:13px;outline:none;font-family:inherit"/></div>
      <div style="flex:1;text-align:center"><div style="font-size:10px;color:var(--muted);margin-bottom:3px">TOTAL</div><div id="lt_${i}" style="padding:10px 4px;font-weight:700;color:var(--p);font-size:13px">${((l.qte||1)*(l.pu||0)).toFixed(2)}€</div></div>
    </div>
  </div>`;
}
window.addLigne = () => {
  const box = document.getElementById('lignesBox'), i=box.children.length;
  const div = document.createElement('div');
  div.innerHTML = ligneHtml({description:'',detail:'',qte:1,pu:0},i);
  box.appendChild(div.firstElementChild); updateTotaux();
}
window.removeLigne = i => { const el=document.getElementById('lg_'+i); if(el){el.remove();updateTotaux();} }

function updateTotaux() {
  let ht = 0;
  document.querySelectorAll('.ligne-item').forEach((el,i) => {
    const nums=el.querySelectorAll('input[type=number]');
    const q=parseFloat(nums[0]?.value||1), p=parseFloat(nums[1]?.value||0), t=q*p;
    ht+=t;
    const lt=document.getElementById('lt_'+i); if(lt) lt.textContent=t.toFixed(2)+'€';
  });
  const tvaEnabled = window._tvaEnabled !== false;
  const tvaRate = window._tvaRate||20;
  const tva = tvaEnabled ? ht*tvaRate/100 : 0;
  const ttc = ht+tva;
  const e1=document.getElementById('totalHT'),e2=document.getElementById('totalTVA'),e3=document.getElementById('totalTTC');
  if(e1) e1.textContent=ht.toFixed(2)+' €';
  if(e2) e2.textContent=tva.toFixed(2)+' €';
  if(e3) e3.textContent=ttc.toFixed(2)+' €';
}

  const c=clients.find(x=>x.id===id), el=document.getElementById('clientInfo');

  if(c){el.style.display='block';el.innerHTML=`<b>${c.prenom||''} ${c.nom||''}</b><br>${c.adresse||''}, ${c.cp||''} ${c.ville||''}${c.tel?'<br>'+c.tel:''}`;} else el.style.display='none';

window.aiDesc = async () => {
  const objet=document.getElementById('d_objet')?.value;
  if(!objet){alert('Remplis l\'objet d\'abord.');return;}
  const btn=document.querySelector('[onclick="aiDesc()"]');
  if(btn){btn.innerHTML='⏳...';btn.disabled=true;}
  const r = await callAI(`Assistant professionnel. Rédige une description sinistre pour assureur en 3-4 phrases pour : "${objet}". Texte uniquement, pas de markdown.`);
  const el=document.getElementById('d_sinistre'); if(el) el.value=r.trim();
  if(btn){btn.innerHTML='✨ IA';btn.disabled=false;}
}

function getLignes() {
  const lignes=[];
  document.querySelectorAll('.ligne-item').forEach(el=>{
    const inputs=el.querySelectorAll('input:not([type=number])');
    const nums=el.querySelectorAll('input[type=number]');
    const desc=inputs[0]?.value||'', detail=inputs[1]?.value||'';
    const qte=parseFloat(nums[0]?.value||1), pu=parseFloat(nums[1]?.value||0);
    if(desc) lignes.push({description:desc,detail,qte,pu});
  });
  return lignes;
}

window.saveDoc = async () => {
  const lignes=getLignes(), clientId=document.getElementById('d_clientId')?.value||'';
  const client=clients.find(x=>x.id===clientId);
  const tvaEnabled = document.getElementById('d_tvaEnabled')?.checked!==false;
  const tvaCustom = document.getElementById('tvaCustom');
  const tvaRate = tvaCustom?.classList.contains('show') ? parseFloat(tvaCustom.value||0) : (window._tvaRate||20);
  const data = {
    type:window._doc?.type||'facture',
    numero:document.getElementById('d_num')?.value||'',
    date:document.getElementById('d_date')?.value||'',
    dateIntervention:document.getElementById('d_dateint')?.value||'',
    objet:document.getElementById('d_objet')?.value||'',
    clientId, clientNom:client?.nom||'', clientPrenom:client?.prenom||'',
    clientAdresse:client?.adresse||'', clientCp:client?.cp||'', clientVille:client?.ville||'', clientTel:client?.tel||'',
    lignes, tvaEnabled, tvaRate,
    paye:document.getElementById('d_paye')?.checked||false,
    datePaiement:document.getElementById('d_datepay')?.value||'',
    descSinistre:document.getElementById('d_sinistre')?.value||'',
    travauxSuite:document.getElementById('d_travaux')?.value||'',
    updatedAt:serverTimestamp(),
  };
  const uid=user.uid;
  if(editingDoc) await updateDoc(doc(db,'users',uid,'documents',editingDoc),data);
  else await addDoc(collection(db,'users',uid,'documents'),{...data,createdAt:serverTimestamp()});
  closeModal(); toast('✅ Document enregistré');
}

window.deleteDoc = async id => { if(!confirm('Supprimer ?'))return; await deleteDoc(doc(db,'users',user.uid,'documents',id)); navigate(tab); toast('🗑️ Document supprimé'); }
window.convertToFacture = id => {
  const d=documents.find(x=>x.id===id); if(!d)return;
  editingDoc=null;
  openNewDoc('facture',{...d,id:undefined,type:'facture',numero:nextNumero('facture'),date:today()});
}

// PREVIEW
window.openPreview = id => { const d=documents.find(x=>x.id===id); if(d) showPreview(d); }
window.previewCurrent = () => {
  const lignes=getLignes(), clientId=document.getElementById('d_clientId')?.value||'';
  const client=clients.find(x=>x.id===clientId);
  const tvaEnabled = document.getElementById('d_tvaEnabled')?.checked!==false;

    clientNom:client?.nom||'', clientPrenom:client?.prenom||'',

    numero:document.getElementById('d_num')?.value||'',
    date:document.getElementById('d_date')?.value||'',
    objet:document.getElementById('d_objet')?.value||'',
    paye:document.getElementById('d_paye')?.checked||false,
    datePaiement:document.getElementById('d_datepay')?.value||'',
    descSinistre:document.getElementById('d_sinistre')?.value||'',
    travauxSuite:document.getElementById('d_travaux')?.value||'',
  });
  closeModal();
}

    .mb h3{font-size:7pt;color:#8884A8;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}

    thead tr{background:#5B4FE8;color:white}thead th{padding:3mm 4mm;text-align:left;font-size:8.5pt}

  <div style="position:relative;z-index:1">
  <div class="hdr">
    <div class="co"><h1>${co.company||'Mon Entreprise'}</h1>${co.adresse?`<p>${co.adresse}, ${co.cp||''} ${co.ville||''}</p>`:''}${co.siret?`<p>SIRET : ${co.siret}</p>`:''}${co.tel?`<p>${co.tel}</p>`:''}
    ${!co.tvaAssujetti?`<p style="font-size:7.5pt;color:#888">TVA non applicable – art. 293 B du CGI</p>`:''}</div>
    <div class="dt"><h2>${isF?'FACTURE':'DEVIS'}</h2><p>N° ${d.numero||''}</p><p>Date : ${d.date||''}</p>${isF?`<p>Intervention : ${d.dateIntervention||d.date||''}</p>`:`<p>Valable 30 jours</p>`}</div>

window.closePreview=()=>document.getElementById('previewOverlay').classList.remove('open');
window.printPreview=()=>{ const w=window.open('','_blank'); w.document.write(window._previewHtml); w.document.close(); setTimeout(()=>w.print(),600); }

// AI MODAL
window.openAI = () => {
  openModal(`
    <div class="modal-header">
      <span style="font-size:22px">✨</span>
      <div><div class="modal-title">Génération par IA</div><div style="color:rgba(255,255,255,0.6);font-size:11px">Décris l'intervention en langage naturel</div></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <textarea id="ai_prompt" placeholder="Ex: Facture pour Martin Dupont, dépannage électrique urgence nuit, infiltration eau gaine électrique, 2h de main d'oeuvre à 65€/h, déplacement urgence 50€, fournitures 46€, total 350€ TTC payé..." style="min-height:130px"></textarea>
      <button class="btn btn-ai" id="aiGenBtn" style="width:100%;margin-top:12px;justify-content:center" onclick="runAI()">
        ✨ Générer le document
      </button>
      <div class="ai-loading" id="aiLoading">
        <div class="ai-spinner"></div>
        <div class="ai-loading-text">L'IA génère votre document<span class="ai-dots"><span>.</span><span>.</span><span>.</span></span></div>
        <div class="ai-loading-sub">Analyse de votre description en cours...</div>
      </div>
      <div id="aiResult"></div>
    </div>
  `);
}

window.runAI = async () => {
  const prompt=document.getElementById('ai_prompt')?.value;
  if(!prompt?.trim()){toast('Décris l\'intervention d\'abord !');return;}
  const btn=document.getElementById('aiGenBtn');
  const loading=document.getElementById('aiLoading');
  if(btn){btn.style.display='none';}
  if(loading){loading.classList.add('show');}

  const clientList=clients.map(c=>`- ${c.prenom||''} ${c.nom||''}, ${c.ville||''} (id:${c.id})`).join('\n');
  const res = await callAI(`Assistant pour application de facturation française. Retourne UNIQUEMENT un JSON valide sans markdown ni backticks.
Clients existants:\n${clientList||'Aucun'}
TVA: ${profile?.tvaAssujetti!==false?'Assujetti (20% par défaut)':'Micro-entrepreneur (sans TVA)'}
Demande: "${prompt}"
JSON exact: {"type":"facture","objet":"","clientId":"id si trouvé sinon vide","clientNom":"","clientPrenom":"","lignes":[{"description":"","detail":"","qte":1,"pu":0}],"tvaEnabled":${profile?.tvaAssujetti!==false},"tvaRate":20,"descSinistre":"","travauxSuite":"","paye":false,"datePaiement":"","suggestions":""}`);

  if(loading){loading.classList.remove('show');}
  if(btn){btn.style.display='flex';}

  try {
    const data=JSON.parse(res.replace(/```json|```/g,'').trim());
    const el=document.getElementById('aiResult');
    if(el) el.innerHTML=`
      <div class="ai-result">
        <div style="color:var(--grn);font-weight:700;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Document généré !
        </div>
        <div style="font-size:13px;margin-bottom:4px"><b>Type :</b> ${data.type==='facture'?'Facture':'Devis'}</div>
        <div style="font-size:13px;margin-bottom:4px"><b>Objet :</b> ${data.objet}</div>
        <div style="font-size:13px;margin-bottom:4px"><b>Lignes :</b> ${data.lignes?.length} poste(s)</div>
        <div style="font-size:13px;margin-bottom:${data.suggestions?'8':'12'}px"><b>TVA :</b> ${data.tvaEnabled?data.tvaRate+'%':'Sans TVA'}</div>
        ${data.suggestions?`<div style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:12px">💡 ${data.suggestions}</div>`:''}
        <button class="btn btn-grn" style="width:100%;justify-content:center" onclick='applyAI(${JSON.stringify(JSON.stringify(data))})'>Ouvrir dans l'éditeur →</button>
      </div>`;
  } catch(e) { toast('❌ Erreur IA. Réessaie.'); }
}

window.applyAI = dataStr => {
  const data=JSON.parse(dataStr); closeModal(); editingDoc=null;
  window._doc={ type:data.type||'facture', numero:nextNumero(data.type||'facture'), date:today(), dateIntervention:today(), ...data };
  showDocForm(window._doc);
  setTimeout(()=>{ const sel=document.getElementById('d_clientId'); if(sel&&data.clientId){sel.value=data.clientId;updateClientInfo(data.clientId);} },100);
}
window.showUpgrade = () => navigate('compte');

// AI CALL
async function callAI(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, messages:[{role:'user',content:prompt}] })
  });
  const d = await res.json();
  return d.content?.map(b=>b.text||'').join('')||'';
}

// MODAL
function openModal(html) { document.getElementById('modalContent').innerHTML=html; document.getElementById('modalOverlay').classList.add('open'); }
window.closeModal=()=>document.getElementById('modalOverlay').classList.remove('open');
window.closeModalOutside=e=>{ if(e.target===document.getElementById('modalOverlay')) closeModal(); }
window.toggleProfile=()=>document.getElementById('profileMenu').classList.toggle('open');
window.closeProfile=()=>document.getElementById('profileMenu').classList.remove('open');
</script>
